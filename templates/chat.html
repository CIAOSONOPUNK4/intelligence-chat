<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>IntelligenceChat AI</title>
    <style>
        body { display: flex; height: 100vh; margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background-color: #343541; color: #ececf1; }
        #sidebar { width: 260px; background-color: #202123; padding: 15px; display: flex; flex-direction: column; }
        #chat-container { flex: 1; display: flex; flex-direction: column; background-color: #343541; }
        .btn-nuova { border: 1px solid #4f505e; background: transparent; color: white; padding: 12px; border-radius: 5px; text-align: left; cursor: pointer; transition: 0.2s; }
        .btn-nuova:hover { background-color: #2a2b32; }
        #cronologia { flex: 1; margin-top: 20px; overflow-y: auto; }
        .chat-item { padding: 10px; margin: 5px 0; border-radius: 5px; cursor: pointer; background-color: #232429; font-size: 14px; }
        #top-bar { background-color: #2a2b32; padding: 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #202123; }
        select { background: #40414f; color: white; border: 1px solid #4f505e; padding: 8px; border-radius: 5px; }
        #messaggi-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .msg { padding: 15px; border-radius: 8px; max-width: 85%; line-height: 1.5; }
        .user { background-color: #40414f; align-self: flex-end; }
        .model { background-color: #444654; align-self: flex-start; border-left: 4px solid #10a37f; }
        pre { background: #1e1e24; padding: 15px; border-radius: 5px; overflow-x: auto; font-family: 'Courier New', monospace; color: #39ff14; }
        img { max-width: 100%; max-height: 400px; border-radius: 8px; margin-top: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #input-area { padding: 20px; display: flex; gap: 10px; background-color: #343541; }
        input[type="text"] { flex: 1; padding: 14px; border-radius: 5px; border: none; background-color: #40414f; color: white; font-size: 16px; }
        .btn-action { padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; }
        .invia { background-color: #10a37f; }
        .codice { background-color: #2b5797; }
        .immagine { background-color: #b91d47; }
        #loading { display: none; text-align: center; color: #10a37f; font-weight: bold; padding: 10px; }
    </style>
</head>
<body>
    <div id="sidebar">
        <button class="btn-nuova" onclick="nuovaChat()">+ Nuova Chat</button>
        <div id="cronologia"></div>
        <button class="btn-nuova" style="background-color: #b91d47; border:none; text-align: center;" onclick="window.location.href='/api/logout'">Log Out</button>
    </div>
    <div id="chat-container">
        <div id="top-bar">
            <span>Modello AI Attivo:</span>
            <select id="modello">
                <option>Gemini 2.5 Flash (Ricerca Web)</option>
                <option>Gemini 2.5 Flash (Standard)</option>
                <option>Gemini 2.5 Pro (Massima Logica)</option>
            </select>
            <span style="margin-left: auto;">Utente: <b>{{ username }}</b></span>
        </div>
        <div id="messaggi-box"></div>
        <div id="loading">L'AI sta elaborando la richiesta...</div>
        <div id="input-area">
            <input type="text" id="prompt" placeholder="Scrivi un messaggio o chiedi di creare codice/immagini...">
            <button class="btn-action invia" onclick="invia('testo')">Invia Chat</button>
            <button class="btn-action codice" onclick="invia('codice')">&lt;/&gt; Codice</button>
            <button class="btn-action immagine" onclick="invia('immagine')">🎨 Immagine</button>
        </div>
    </div>

    <script>
        let sessioneAttualeId = null;

        function caricaSessioni() {
            fetch('/api/sessioni').then(res => res.json()).then(data => {
                const crono = document.getElementById('cronologia');
                crono.innerHTML = '';
                data.forEach(s => {
                    let div = document.createElement('div');
                    div.className = 'chat-item';
                    div.innerText = "💬 " + s.titolo;
                    div.onclick = () => selezionaChat(s.id);
                    crono.appendChild(div);
                });
                if(data.length > 0 && !sessioneAttualeId) {
                    selezionaChat(data[0].id);
                }
            });
        }

        function nuovaChat() {
            fetch('/api/sessioni', {method: 'POST'}).then(res => res.json()).then(data => {
                sessioneAttualeId = data.id;
                caricaSessioni();
                selezionaChat(data.id);
            });
        }

        function selezionaChat(id) {
            sessioneAttualeId = id;
            fetch(`/api/messaggi/${id}`).then(res => res.json()).then(data => {
                const box = document.getElementById('messaggi-box');
                box.innerHTML = '';
                data.forEach(m => appendiMessaggio(m.ruolo, m.testo, m.tipo));
                box.scrollTop = box.scrollHeight;
            });
        }

        function appendiMessaggio(ruolo, testo, tipo) {
            const box = document.getElementById('messaggi-box');
            let div = document.createElement('div');
            div.className = `msg ${ruolo}`;
            
            if(tipo === 'codice' && ruolo === 'model') {
                let pulito = testo.replace(/```[a-z]*/g, '');
                div.innerHTML = `<b>AI (Codice generato):</b><pre>${pulito}</pre>`;
            } else if(tipo === 'immagine' && ruolo === 'model') {
                div.innerHTML = `<b>AI:</b><br><img src="${testo}" alt="Immagine Generata">`;
            } else {
                div.innerHTML = `<b>${ruolo === 'user' ? 'Tu' : 'AI'}:</b><br>${testo.replace(/\n/g, '<br>')}`;
            }
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function invia(tipoRichiesta) {
            const promptInput = document.getElementById('prompt');
            const testo = promptInput.value.trim();
            if(!testo) return;
            if(!sessioneAttualeId) return alert("Crea o seleziona una chat prima!");

            appendiMessaggio('user', testo, 'testo');
            promptInput.value = '';
            
            document.getElementById('loading').style.display = 'block';

            fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    sessione_id: sessioneAttualeId,
                    testo: testo,
                    modello: document.getElementById('modello').value,
                    tipo: tipoRichiesta
                })
            }).then(res => res.json()).then(data => {
                document.getElementById('loading').style.display = 'none';
                appendiMessaggio(data.ruolo, data.testo, data.tipo);
                caricaSessioni();
            });
        }

        caricaSessioni();
    </script>
</body>
</html>
